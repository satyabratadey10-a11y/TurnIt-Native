plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.turnit.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.turnit.app"
        minSdk 26
        targetSdk 34
        versionCode 11
        versionName "11.0-QX"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Injecting API Keys from GitHub Secrets to BuildConfig
        buildConfigField("String", "GEMINI_API_KEY", "\"${System.getenv('GEMINI_API_KEY') ?: ''}\"")
        buildConfigField("String", "HUGGINGFACE_API_KEY", "\"${System.getenv('HUGGINGFACE_API_KEY') ?: ''}\"")
        buildConfigField("String", "TURSO_DB_URL", "\"${System.getenv('TURSO_DB_URL') ?: ''}\"")
        buildConfigField("String", "TURSO_AUTH_TOKEN", "\"${System.getenv('TURSO_AUTH_TOKEN') ?: ''}\"")
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    // --- FIX FOR BUILD #36 (META-INF DUPLICATION) ---
    packaging {
        resources {
            // Exclude conflicting metadata files from Netty and Ktor
            excludes += "/META-INF/INDEX.LIST"
            excludes += "/META-INF/io.netty.versions.properties"
            excludes += "/META-INF/DEPENDENCIES"
            
            // General cleanup for cleaner APK packaging
            excludes += "/META-INF/LICENSE*"
            excludes += "/META-INF/NOTICE*"
            excludes += "/META-INF/AL2.0"
            excludes += "/META-INF/LGPL2.1"
        }
    }
}

dependencies {
    // Core Android & Material Design
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"
    implementation "androidx.recyclerview:recyclerview:1.3.2"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.6.2"
    implementation "androidx.drawerlayout:drawerlayout:1.2.0"

    // Networking & Coroutines for AI Logic
    implementation "com.squareup.okhttp3:okhttp:4.11.0"
    implementation "com.squareup.okhttp3:logging-interceptor:4.11.0"  // For debugging
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

    // Ktor Server & Client (Integrated for Qwen-Claude Logic)
    implementation "io.ktor:ktor-client-core:2.3.7"
    implementation "io.ktor:ktor-client-okhttp:2.3.7"
    implementation "io.ktor:ktor-server-netty:2.3.7"
    implementation "io.ktor:ktor-server-content-negotiation:2.3.7"

    // JSON Parsing
    implementation "org.json:json:20231013"

    // Testing Utilities
    testImplementation "junit:junit:4.13.2"
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.5.1"
}
